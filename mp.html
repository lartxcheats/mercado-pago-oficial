<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="theme-color" content="#FFE600">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Mercado Pago</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logomp.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mp.css">
</head>
<body>
    <div class="app">

        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="user-info">
                    <img src="logomp.png" alt="Mercado Pago" class="logo-mp">
                    <span class="greeting">Olá, Gustavo</span>
                </div>
                <div class="header-actions">
                    <button class="icon-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2.2" stroke-linecap="round">
                            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                        </svg>
                    </button>
                    <button class="icon-btn notification">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2.2" stroke-linecap="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                        </svg>
                        <span class="badge">2</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active">Saldo</button>
            <button class="tab">Cofrinhos</button>
            <button class="tab">Investimentos</button>
            <button class="tab">Cripto</button>
        </div>

        <!-- Main content -->
        <main class="content">

            <!-- Balance card -->
            <div class="balance-card">
                <div class="balance-header">
                    <div class="balance-amount" id="balance">
                        <span class="currency">R$</span>
                        <span class="value">0,00</span>
                        <button class="eye-btn" aria-label="Mostrar/ocultar saldo">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <a href="#" class="extract-link">Extrato →</a>
                </div>
                <div class="cdi-info">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00A650" stroke-width="2.5" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                    100% do CDI
                </div>

                <!-- Promo card -->
                <div class="promo-card">
                    <div class="promo-header">
                        <h3>Melhor rendimento a caminho!</h3>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
                    </div>
                    <div class="progress-bar"><div class="progress-fill"></div></div>
                    <div class="promo-bottom">
                        <p class="promo-text">Deposite mais R$ 964,90 este mês para ter <span class="highlight">105% do CDI.</span> 🔥</p>
                        <button class="btn-primary">Depositar</button>
                    </div>
                </div>
            </div>

            <!-- Cartão de crédito -->
            <section class="credit-section">
                <h2 class="section-title">
                    Cartão de crédito
                    <span class="visa-logo">VISA</span>
                    <img src="images.png" alt="Cartão" class="card-icon-img">
                </h2>
                <div class="credit-card-banner">
                    <img src="cartao.jpeg" alt="Cartão de crédito" class="credit-card-banner-img">
                </div>
            </section>

            <!-- Empréstimos -->
            <section class="loan-section">
                <h2 class="section-title">Empréstimos</h2>
                <a href="#" class="link-primary">Consultar →</a>
            </section>

            <!-- Linha de crédito -->
            <div class="credit-line-card">
                <p>Peça a Linha de Crédito para comprar e pagar em até 24x sem cartão</p>
                <button class="btn-primary">Pedir</button>
            </div>

        </main>

        <!-- Bottom nav -->
        <nav class="bottom-nav">
            <button class="nav-item active">
                <img src="casinha.png" alt="Conta" class="nav-icon-img">
                <span>Conta</span>
            </button>
            <button class="nav-item">
                <img src="catao.png" alt="Cartões" class="nav-icon-img">
                <span>Cartões</span>
            </button>
            <button class="nav-item nav-center" onclick="window.location.href='pix.html'">
                <div class="nav-circle">
                    <img src="pix2.png" alt="Pix" class="pix-icon">
                </div>
                <span>Pix</span>
            </button>
            <button class="nav-item">
                <img src="pagamento.png" alt="Pagamentos" class="nav-icon-img">
                <span>Pagamentos</span>
            </button>
            <button class="nav-item">
                <img src="mais.png" alt="Mais" class="nav-icon-img">
                <span>Mais</span>
            </button>
        </nav>
    </div>
    <script src="mp.js"></script>
</body>
</html>
